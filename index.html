<html lang="zh-CN">
<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050510;min-height:100vh;display:flex;flex-direction:column;align-items:center;font-family:'Huiwen-mincho','Noto Serif SC',serif;color:#f0e6d3;overflow:hidden}
#camera-wrap{position:fixed;top:16px;right:16px;width:160px;height:120px;border:1px solid rgba(200,83,74,0.3);border-radius:12px;overflow:hidden;z-index:300;background:#000;box-shadow:0 0 20px rgba(200,83,74,0.2)}
#video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
#hand-canvas{position:absolute;inset:0;width:100%;height:100%;transform:scaleX(-1)}
#gesture-hint{position:fixed;top:16px;left:16px;font-size:0.7rem;color:rgba(200,83,74,0.6);letter-spacing:0.08em;z-index:300;background:rgba(5,5,16,0.85);padding:10px 14px;border-radius:8px;border:1px solid rgba(200,83,74,0.2);line-height:2}
#gesture-hint .active{color:#c8534a;font-weight:bold}
#confirm-ring{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:110px;height:110px;z-index:500;pointer-events:none}
#confirm-ring.active{display:block}
#confirm-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
#confirm-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:0.65rem;color:#c8534a;letter-spacing:0.1em}
#main-title{position:fixed;top:28px;left:50%;transform:translateX(-50%);font-size:1.1rem;letter-spacing:0.3em;color:#c8534a;text-shadow:0 0 20px rgba(200,83,74,0.4);z-index:100;white-space:nowrap}
#step-hint{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);font-size:0.8rem;color:rgba(200,83,74,0.5);letter-spacing:0.15em;z-index:100;text-align:center;min-width:300px}
#card-field{position:relative;width:100vw;height:100vh;z-index:10}
.tarot-card{position:absolute;width:80px;height:136px;cursor:pointer;transition:transform 0.3s,filter 0.3s;transform-style:preserve-3d}
.tarot-card:hover{transform:scale(1.1) translateY(-8px);filter:brightness(1.3);z-index:20;cursor:pointer}
.tarot-card.selected{transform:scale(1.2) translateY(-18px);z-index:30;animation:selectPulse 0.5s ease;cursor:default}
@keyframes selectPulse{0%{filter:brightness(1)}50%{filter:brightness(2) drop-shadow(0 0 20px rgba(200,83,74,0.9))}100%{filter:brightness(1)}}
.card-face{width:100%;height:100%;position:absolute;border-radius:8px;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;overflow:hidden}
.card-back{background:linear-gradient(160deg,#1a0808,#2a1010);border:1.5px solid rgba(200,83,74,0.35);box-shadow:0 0 12px rgba(200,83,74,0.15)}
.card-back-inner{width:80%;height:88%;border-radius:6px;position:relative;background-image:linear-gradient(45deg,rgba(200,83,74,0.1)25%,transparent 25%),linear-gradient(-45deg,rgba(200,83,74,0.1)25%,transparent 25%),linear-gradient(45deg,transparent 75%,rgba(200,83,74,0.1)75%),linear-gradient(-45deg,transparent 75%,rgba(200,83,74,0.1)75%);background-size:10px 10px;background-position:0 0,0 5px,5px -5px,-5px 0;background-color:rgba(0,0,0,0.3);border:1px solid rgba(200,83,74,0.2)}
.card-back-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:32px;height:32px;border:1px solid rgba(200,83,74,0.5);border-radius:50%;background:rgba(26,8,8,0.9);display:flex;align-items:center;justify-content:center}
.card-name-tag{position:absolute;bottom:4px;left:0;right:0;text-align:center;font-size:0.5rem;color:rgba(200,83,74,0.6);letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:0;transition:opacity 0.3s}
.tarot-card.selected .card-name-tag{opacity:1}
.stars-bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.s{position:absolute;border-radius:50%;background:#fff;animation:tb linear infinite}
@keyframes tb{0%,100%{opacity:0.2}50%{opacity:1}}
</style>
</head>

  {n:'XIX',name:'太阳',svg:'<svg viewBox="0 0 60 90"><text x="30" y="16" text-anchor="middle" font-size="9" fill="#c8534a">XIX</text><text x="30" y="28" text-anchor="middle" font-size="6" fill="#c8534a">太阳</text><circle cx="30" cy="54" r="12" fill="none" stroke="#c8534a" stroke-width="1"/><circle cx="30" cy="54" r="6" fill="#c8534a" opacity="0.3"/></svg>'},
  {n:'XX',name:'审判',svg:'<svg viewBox="0 0 60 90"><text x="30" y="16" text-anchor="middle" font-size="9" fill="#c8534a">XX</text><text x="30" y="28" text-anchor="middle" font-size="6" fill="#c8534a">审判</text><ellipse cx="30" cy="54" rx="14" ry="10" fill="none" stroke="#c8534a" stroke-width="1"/></svg>'},
  {n:'XXI',name:'世界',svg:'<svg viewBox="0 0 60 90"><text x="30" y="16" text-anchor="middle" font-size="9" fill="#c8534a">XXI</text><text x="30" y="28" text-anchor="middle" font-size="6" fill="#c8534a">世界</text><ellipse cx="30" cy="54" rx="16" ry="16" fill="none" stroke="#c8534a" stroke-width="1.2"/><ellipse cx="30" cy="54" rx="8" ry="8" fill="none" stroke="#c8534a" stroke-width="0.8"/></svg>'},

(function(){
  var s=document.getElementById('starsBg');
  for(var i=0;i<80;i++){
    var d=document.createElement('div');
    d.className='s';
    var sz=0.5+Math.random()*2;
    d.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;animation-duration:'+(2+Math.random()*4)+'s;animation-delay:'+Math.random()*3+'s;opacity:'+(0.2+Math.random()*0.6);
    s.appendChild(d);
  }
})();
var cardEls=[];
var selectedCard=null;
var hoveredCard=null;
var fistStart=0;
var fistDone=false;
var CIRCLE=314.16;
function buildCards(){
  var field=document.getElementById('cardField');
  var cx=window.innerWidth/2;
  var cy=window.innerHeight/2;
  var spread=[{x:cx-170,y:cy+40,rot:-18},{x:cx,y:cy-20,rot:0},{x:cx+170,y:cy+40,rot:18}];
  var ringR=Math.min(window.innerWidth*0.38,340);
  cards.forEach(function(card,i){
    var pos=i<3?spread[i]:(function(){
      var a=((i-3-9.5)*22-90)*Math.PI/180;
      return {x:cx+Math.cos(a)*ringR,y:cy+Math.sin(a)*ringR,rot:0};
    })();
    var el=document.createElement('div');
    el.className='tarot-card';
    el.id='tc'+i;
    el.innerHTML='<div class="card-face card-back"><div class="card-back-inner"><div class="card-back-center"><svg viewBox="0 0 36 36" fill="none"><circle cx="18" cy="14" r="9" fill="#c8534a" opacity="0.8"/><path d="M18 5 Q20 1 23 3" stroke="#5a3a2a" stroke-width="1.5" fill="none"/></svg></div></div></div><div class="card-name-tag" id="cname'+i+'">'+card.name+'</div>';
    el.style.left=(pos.x-40)+'px';
    el.style.top=(pos.y-68)+'px';
    el.style.transform='rotate('+pos.rot+'deg)';
    field.appendChild(el);
    cardEls.push({el,card,x:pos.x,y:pos.y});
  });
}
function onSelect(idx){
  if(selectedCard===idx){
    // deselect
    cardEls[idx].el.classList.remove('selected','hovered');
    selectedCard=null;
    document.getElementById('step-hint').innerHTML='用手指向一张牌开始';
    return;
  }
  if(selectedCard!==null){
    // switch selection
    cardEls[selectedCard].el.classList.remove('selected');
  }
  selectedCard=idx;
  cardEls.forEach(function(c,i){
    c.el.classList.remove('selected','hovered');
    if(i===idx)c.el.classList.add('selected');
  });
  document.getElementById('step-hint').innerHTML='<input id="qinp" placeholder="在这里输入你的问题…" style="background:rgba(200,83,74,0.1);border:1px solid rgba(200,83,74,0.3);color:#f0e6d3;padding:8px 16px;border-radius:20px;font-size:0.8rem;width:260px;text-align:center;outline:none;font-family:inherit"> <button onclick="submitQ()" style="background:rgba(200,83,74,0.15);border:1px solid rgba(200,83,74,0.35);color:#c8534a;padding:8px 14px;border-radius:20px;cursor:pointer;font-family:inherit">提问</button>';
}
window.submitQ=function(){
  var inp=document.getElementById('qinp');
  if(!inp||!inp.value.trim())return;
  var c=cards[selectedCard];
  var q=inp.value.trim();
  document.getElementById('step-hint').innerHTML='<div style="font-size:0.9rem;color:#c8534a;letter-spacing:0.08em;margin-bottom:6px">'+c.name+'</div><div style="font-size:0.65rem;color:rgba(200,83,74,0.45);max-width:420px;line-height:1.8">问题：'+q+'<br><br><span style="color:rgba(200,83,74,0.3)">（AI解读功能待接入 API Key）</span></div>';
};
var videoEl=document.getElementById('video');
var handCanvas=document.getElementById('hand-canvas');
var hCtx=handCanvas.getContext('2d');
handCanvas.width=160;handCanvas.height=120;
var gStatus=document.getElementById('gestureStatus');
var cRing=document.getElementById('confirm-ring');
var cProg=document.getElementById('confirmProgress');
var gCursor=document.getElementById('gestureCursor');
var fistPos={x:0,y:0};
var fistStart=0;
var fistDone=false;
var lastFistPos={x:0,y:0};
var lastFistTime=0;

function handToScreen(hx,hy){
  // Camera at top-right, mirrored: left of camera = right of screen
  // hx, hy in [0,1] (camera normalized)
  var sx=window.innerWidth-160+(1-hx)*160;
  var sy=hy*120;
  return {x:sx,y:sy};
}

function findCardAt(sx,sy){
  var near=null,md=55;
  cardEls.forEach(function(c,idx){
    var d=Math.hypot(c.x-sx,c.y-sy);
    if(d<md){md=d;near=idx;}
  });
  return near;
}

function updateG(g,sx,sy){
  if(gStatus)gStatus.textContent=g;
  if(g==='握拳'){
    // 检测是否在同一点附近保持
    var moved=Math.hypot(sx-lastFistPos.x,sy-lastFistPos.y)>25;
    if(moved){lastFistPos={x:sx,y:sy};lastFistTime=Date.now();fistStart=0;fistDone=false;}
    else{
      if(fistStart===0)fistStart=Date.now();
      var held=Date.now()-lastFistTime;
      var pct=Math.min(held/3000,1);
      cRing.classList.add('active');
      cProg.style.strokeDashoffset=CIRCLE*(1-pct);
      if(held>=3000&&!fistDone){
        fistDone=true;
        var cardIdx=findCardAt(sx,sy);
        if(cardIdx!==null){
          if(selectedCard===null)onSelect(cardIdx);
          else if(selectedCard===cardIdx)submitQ();
          else {cardEls[selectedCard].el.classList.remove('selected');onSelect(cardIdx);}
        }
      }
    }
    gCursor.style.display='block';
    gCursor.style.left=sx+'px';
    gCursor.style.top=sy+'px';
  }else if(g==='张开手'){
    fistStart=0;fistDone=false;lastFistTime=0;
    cRing.classList.remove('active');
    cProg.style.strokeDashoffset=CIRCLE;
    gCursor.style.display='none';
    if(selectedCard!==null){
      cardEls[selectedCard].el.classList.remove('selected');
      selectedCard=null;
      document.getElementById('step-hint').innerHTML='用手指向一张牌开始';
    }
    if(hoveredCard!==null){cardEls[hoveredCard].el.classList.remove('hovered');hoveredCard=null;}
  }else{
    fistStart=0;fistDone=false;lastFistTime=0;
    cRing.classList.remove('active');
    cProg.style.strokeDashoffset=CIRCLE;
    gCursor.style.display='none';
  }
}
function onResults(results){
  hCtx.clearRect(0,0,160,120);
  if(!results.multiHandLandmarks||!results.multiHandLandmarks.length)return;
  var lm=results.multiHandLandmarks[0];
  hCtx.strokeStyle='rgba(200,83,74,0.7)';hCtx.lineWidth=2;
  [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20],[0,17]].forEach(function([a,b]){hCtx.beginPath();hCtx.moveTo(lm[a].x*160,lm[a].y*120);hCtx.lineTo(lm[b].x*160,lm[b].y*120);hCtx.stroke();});
  lm.forEach(function(p){hCtx.beginPath();hCtx.arc(p.x*160,p.y*120,3,0,Math.PI*2);hCtx.fillStyle='rgba(200,83,74,0.9)';hCtx.fill();});
  var t=lm[4],i=lm[8],m=lm[12],r=lm[16],p=lm[20];
  var iUp=Math.abs(i.y-lm[5].y)>0.06;
  var mUp=Math.abs(m.y-lm[9].y)>0.06;
  var rUp=Math.abs(r.y-lm[13].y)>0.06;
  var pUp=Math.abs(p.y-lm[17].y)>0.06;
  var td=Math.hypot(t.x-i.x,t.y-i.y);
  var palm=handToScreen((lm[0].x+lm[9].x)/2,(lm[0].y+lm[9].y)/2);
  var g='无手势';
  if(td<0.05&&!iUp&&!mUp&&!rUp&&!pUp)g='握拳';
  else if(iUp&&mUp&&rUp&&pUp)g='张开手';
  updateG(g,palm.x,palm.y);
}
const hands=new Hands({locateFile:function(f){return'https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/'+f}});
hands.setOptions({maxNumHands:1,modelComplexity:1,minDetectionConfidence:0.7,minTrackingConfidence:0.5});
hands.onResults(onResults);
try {
  const cam=new Camera(videoEl,{onFrame:async function(){await hands.send({image:videoEl});},width:160,height:120});
  cam.start().catch(function(e){
    console.warn('Camera not available:',e.message);
    document.getElementById('camera-wrap').style.display='none';
    document.getElementById('gestureStatus').textContent='摄像头不可用';
  });
} catch(e){
  console.warn('Camera init failed:',e.message);
  document.getElementById('camera-wrap').style.display='none';
}
window.addEventListener('load', function(){
  buildCards();
});
</script>
