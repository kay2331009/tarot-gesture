<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caleb · 手势塔罗</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fontsapi.zeoseven.com/256/main/result.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050510;min-height:100vh;display:flex;flex-direction:column;align-items:center;font-family:'Huiwen-mincho','Noto Serif SC',serif;color:#f0e6d3;overflow:hidden}
#camera-wrap{position:fixed;top:16px;right:16px;width:160px;height:120px;border:1px solid rgba(200,83,74,0.3);border-radius:12px;overflow:hidden;z-index:300;background:#000;box-shadow:0 0 20px rgba(200,83,74,0.2)}
#webcam{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
#gesture-hint{position:fixed;top:16px;left:16px;font-size:0.7rem;color:rgba(200,83,74,0.6);letter-spacing:0.08em;z-index:300;background:rgba(5,5,16,0.85);padding:10px 14px;border-radius:8px;border:1px solid rgba(200,83,74,0.2);line-height:2}
#gesture-hint .active{color:#c8534a;font-weight:bold}
#gesture-status{font-size:0.8rem;margin-top:4px}
#confirm-ring{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:110px;height:110px;z-index:500;pointer-events:none}
#confirm-ring.active{display:block}
#confirm-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
#confirm-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:0.65rem;color:#c8534a;letter-spacing:0.1em}
#gesture-cursor{position:fixed;width:44px;height:44px;border:2px solid rgba(200,83,74,0.8);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 15px rgba(200,83,74,0.5);display:none;transition:top 0.05s linear,left 0.05s linear}
#main-title{position:fixed;top:28px;left:50%;transform:translateX(-50%);font-size:1.1rem;letter-spacing:0.3em;color:#c8534a;text-shadow:0 0 20px rgba(200,83,74,0.4);z-index:100;white-space:nowrap}
#step-hint{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);font-size:0.8rem;color:rgba(200,83,74,0.5);letter-spacing:0.15em;z-index:100;text-align:center;min-width:300px}
#card-field{position:relative;width:100vw;height:100vh;z-index:10}
.tarot-card{position:absolute;width:80px;height:136px;transition:transform 0.25s,filter 0.25s}
.tarot-card.hovered{transform:scale(1.15) translateY(-12px);filter:brightness(1.4) drop-shadow(0 0 12px rgba(200,83,74,0.5));z-index:20}
.tarot-card.selected{transform:scale(1.2) translateY(-18px);z-index:30;animation:selectPulse 0.5s ease;filter:brightness(1.2) drop-shadow(0 0 15px rgba(200,83,74,0.5))}
@keyframes selectPulse{0%{filter:brightness(1)}50%{filter:brightness(2) drop-shadow(0 0 25px rgba(200,83,74,0.9))}100%{filter:brightness(1)}}
.card-face{width:100%;height:100%;position:absolute;border-radius:8px;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;overflow:hidden}
.card-back{background:linear-gradient(160deg,#1a0808,#2a1010);border:1.5px solid rgba(200,83,74,0.35);box-shadow:0 0 12px rgba(200,83,74,0.15)}
.card-back-inner{width:80%;height:88%;border-radius:6px;position:relative;background-image:linear-gradient(45deg,rgba(200,83,74,0.1)25%,transparent 25%),linear-gradient(-45deg,rgba(200,83,74,0.1)25%,transparent 25%),linear-gradient(45deg,transparent 75%,rgba(200,83,74,0.1)75%),linear-gradient(-45deg,transparent 75%,rgba(200,83,74,0.1)75%);background-size:10px 10px;background-position:0 0,0 5px,5px -5px,-5px 0;background-color:rgba(0,0,0,0.3);border:1px solid rgba(200,83,74,0.2)}
.card-back-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:32px;height:32px;border:1px solid rgba(200,83,74,0.5);border-radius:50%;background:rgba(26,8,8,0.9);display:flex;align-items:center;justify-content:center}
.card-name-tag{position:absolute;bottom:4px;left:0;right:0;text-align:center;font-size:0.5rem;color:rgba(200,83,74,0.6);letter-spacing:1px;opacity:0;transition:opacity 0.3s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tarot-card.selected .card-name-tag{opacity:1}
.stars-bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.s{position:absolute;border-radius:50%;background:#fff;animation:tb linear infinite}
@keyframes tb{0%,100%{opacity:0.2}50%{opacity:1}}
#loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:400;color:rgba(200,83,74,0.6);font-size:0.85rem;letter-spacing:0.15em}
#loading .spinner{border:2px solid rgba(200,83,74,0.2);border-top-color:rgba(200,83,74,0.8);border-radius:50%;width:36px;height:36px;animation:spin 1s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div>加载手势模型中…</div>
<div class="stars-bg" id="starsBg"></div>

<div id="camera-wrap">
  <video id="webcam" autoplay playsinline></video>
</div>

<div id="gesture-hint">
  <div>👊 握拳停留3秒 → 确认选牌</div>
  <div>🖐️ 张开手 → 取消选择</div>
  <div id="gesture-status">⏳ 初始化中…</div>
</div>

<div id="confirm-ring">
  <svg viewBox="0 0 110 110">
    <circle cx="55" cy="55" r="50" fill="none" stroke="rgba(200,83,74,0.15)" stroke-width="5"/>
    <circle id="confirmProgress" cx="55" cy="55" r="50" fill="none" stroke="#c8534a" stroke-width="5" stroke-dasharray="314.16" stroke-dashoffset="314.16" stroke-linecap="round"/>
  </svg>
  <div id="confirmText">握拳确认中…</div>
</div>

<div id="gesture-cursor"></div>
<div id="main-title">Caleb 手势塔罗</div>
<div id="step-hint">用握拳指向一张牌，停留3秒选中</div>
<div id="card-field"></div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/handpose@0.1.0/dist/handpose.js"></script>

<script>
var cards=[
  {n:'0',name:'愚人'},{n:'I',name:'魔术师'},{n:'II',name:'女祭司'},{n:'III',name:'女皇'},{n:'IV',name:'皇帝'},{n:'V',name:'教皇'},{n:'VI',name:'恋人'},{n:'VII',name:'战车'},{n:'VIII',name:'力量'},{n:'IX',name:'隐士'},{n:'X',name:'命运之轮'},{n:'XI',name:'正义'},{n:'XII',name:'倒吊人'},{n:'XIII',name:'死神'},{n:'XIV',name:'节制'},{n:'XV',name:'恶魔'},{n:'XVI',name:'塔'},{n:'XVII',name:'星星'},{n:'XVIII',name:'月亮'},{n:'XIX',name:'太阳'},{n:'XX',name:'审判'},{n:'XXI',name:'世界'},
];

(function(){
  var s=document.getElementById('starsBg');
  for(var i=0;i<80;i++){
    var d=document.createElement('div');
    d.className='s';
    var sz=0.5+Math.random()*2;
    d.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;animation-duration:'+(2+Math.random()*4)+'s;animation-delay:'+Math.random()*3+'s;opacity:'+(0.2+Math.random()*0.6);
    s.appendChild(d);
  }
})();

var cardEls=[];
var selectedCard=null;
var hoveredCard=null;

function buildCards(){
  var field=document.getElementById('card-field');
  var cx=window.innerWidth/2;
  var cy=window.innerHeight/2;
  var spread=[{x:cx-160,y:cy+30,rot:-16},{x:cx,y:cy-20,rot:0},{x:cx+160,y:cy+30,rot:16}];
  var ringR=Math.min(window.innerWidth*0.4,360);
  cards.forEach(function(card,i){
    var pos=i<3?spread[i]:(function(){
      var a=((i-3-9)*22-90)*Math.PI/180;
      return {x:cx+Math.cos(a)*ringR,y:cy+Math.sin(a)*ringR,rot:0};
    })();
    var el=document.createElement('div');
    el.className='tarot-card';
    el.id='tc'+i;
    el.innerHTML='<div class="card-face card-back"><div class="card-back-inner"><div class="card-back-center"><svg viewBox="0 0 36 36" fill="none"><circle cx="18" cy="14" r="9" fill="#c8534a" opacity="0.8"/><path d="M18 5 Q20 1 23 3" stroke="#5a3a2a" stroke-width="1.5" fill="none"/></svg></div></div></div><div class="card-name-tag">'+card.name+'</div>';
    el.style.left=(pos.x-40)+'px';
    el.style.top=(pos.y-68)+'px';
    el.style.transform='rotate('+pos.rot+'deg)';
    field.appendChild(el);
    cardEls.push({el:el,card:card,x:pos.x,y:pos.y});
  });
}

function onSelect(idx){
  if(selectedCard===idx){
    cardEls[idx].el.classList.remove('selected');
    selectedCard=null;
    document.getElementById('step-hint').innerHTML='用握拳指向一张牌，停留3秒选中';
    return;
  }
  if(selectedCard!==null) cardEls[selectedCard].el.classList.remove('selected');
  selectedCard=idx;
  cardEls.forEach(function(c,i){
    c.el.classList.remove('selected','hovered');
    if(i===idx)c.el.classList.add('selected');
  });
  document.getElementById('step-hint').innerHTML='<input id="qinp" placeholder="输入你的问题…" style="background:rgba(200,83,74,0.1);border:1px solid rgba(200,83,74,0.3);color:#f0e6d3;padding:8px 16px;border-radius:20px;font-size:0.8rem;width:260px;text-align:center;outline:none;font-family:inherit"> <button onclick="submitQ()" style="background:rgba(200,83,74,0.15);border:1px solid rgba(200,83,74,0.35);color:#c8534a;padding:8px 14px;border-radius:20px;cursor:pointer;font-family:inherit">提问</button>';
}

window.submitQ=function(){
  var inp=document.getElementById('qinp');
  if(!inp||!inp.value.trim())return;
  var c=cards[selectedCard];
  var q=inp.value.trim();
  document.getElementById('step-hint').innerHTML='<div style="font-size:0.9rem;color:#c8534a;letter-spacing:0.08em;margin-bottom:6px">'+c.name+'</div><div style="font-size:0.65rem;color:rgba(200,83,74,0.45);max-width:420px;line-height:1.8">问题：'+q+'<br><br><span style="color:rgba(200,83,74,0.3)">（AI解读功能待接入）</span></div>';
};

// Gesture system
var model=null;
var videoEl=document.getElementById('webcam');
var gCursor=document.getElementById('gesture-cursor');
var gStatus=document.getElementById('gesture-status');
var cRing=document.getElementById('confirm-ring');
var cProg=document.getElementById('confirmProgress');
var CIRCLE=314.16;
var fistHoldStart=0;
var fistDone=false;

function handToScreen(hx,hy){
  // Camera at top-right, video is 160x120, mirrored (scaleX -1)
  // hx: 0=left in video = right on screen; hx: 1=right in video = left on screen
  var sx=window.innerWidth-160+(1-hx)*160;
  var sy=hy*120;
  return {x:sx,y:sy};
}

function findCardAt(sx,sy){
  var near=null,md=50;
  cardEls.forEach(function(c,i){
    var d=Math.hypot(c.x-sx,c.y-sy);
    if(d<md){md=d;near=i;}
  });
  return near;
}

function detectGesture(lm){
  // lm[4]=thumb tip, lm[8]=index tip, lm[12]=middle tip, lm[16]=ring tip, lm[20]=pinky tip
  // lm[3]=thumb IP, lm[6]=index PIP, etc for extended check
  // Simplified: check if fingertips are above their PIPs (y smaller = higher on screen)
  var iExt=lm[8].y<lm[6].y-0.02;
  var mExt=lm[12].y<lm[10].y-0.02;
  var rExt=lm[16].y<lm[14].y-0.02;
  var pExt=lm[20].y<lm[18].y-0.02;
  var thClose=Math.hypot(lm[4].x-lm[8].x,lm[4].y-lm[8].y)<0.07;

  if(iExt && mExt && rExt && pExt) return '张开手';
  if(!iExt && !mExt && !rExt && !pExt && thClose) return '握拳';
  if(iExt && !mExt && !rExt && !pExt) return '指向';
  return '无手势';
}

function processHand(lm){
  var wrist=handToScreen(lm[0].x,lm[0].y);
  var gesture=detectGesture(lm);
  gCursor.style.left=wrist.x+'px';
  gCursor.style.top=wrist.y+'px';
  gStatus.textContent='✋ '+gesture;

  var now=Date.now();
  var cardIdx=findCardAt(wrist.x,wrist.y);

  if(gesture==='张开手'){
    fistHoldStart=0;fistDone=false;
    cRing.classList.remove('active');
    cProg.style.strokeDashoffset=CIRCLE;
    gCursor.style.display='none';
    if(selectedCard!==null){
      cardEls[selectedCard].el.classList.remove('selected');
      selectedCard=null;
      document.getElementById('step-hint').innerHTML='用握拳指向一张牌，停留3秒选中';
    }
    if(hoveredCard!==null){cardEls[hoveredCard].el.classList.remove('hovered');hoveredCard=null;}
  } else if(gesture==='握拳' || gesture==='指向'){
    if(cardIdx!==null && cardIdx!==hoveredCard){
      if(hoveredCard!==null)cardEls[hoveredCard].el.classList.remove('hovered');
      hoveredCard=cardIdx;
      cardEls[hoveredCard].el.classList.add('hovered');
      fistHoldStart=now;fistDone=false;
    } else if(cardIdx===null && hoveredCard!==null){
      cardEls[hoveredCard].el.classList.remove('hovered');
      hoveredCard=null;
      fistHoldStart=0;
      cRing.classList.remove('active');
    }

    if(cardIdx!==null){
      if(fistHoldStart===0)fistHoldStart=now;
      var held=now-fistHoldStart;
      var pct=Math.min(held/3000,1);
      cRing.classList.add('active');
      cProg.style.strokeDashoffset=CIRCLE*(1-pct);
      if(held>=3000 && !fistDone){
        fistDone=true;
        if(selectedCard===null){
          onSelect(hoveredCard);
        } else {
          submitQ();
        }
      }
    } else {
      fistHoldStart=0;
      cRing.classList.remove('active');
    }
    gCursor.style.display='block';
  } else {
    fistHoldStart=0;fistDone=false;
    cRing.classList.remove('active');
    if(hoveredCard!==null){cardEls[hoveredCard].el.classList.remove('hovered');hoveredCard=null;}
  }
}

async function init(){
  try{
    gStatus.textContent='⏳ 加载模型中…';
    await tf.ready();
    model=await handpose.load({maxHands:1});
    gStatus.textContent='✅ 手势已就绪';
    document.getElementById('loading').style.display='none';

    var stream=await navigator.mediaDevices.getUserMedia({video:{width:160,height:120,facingMode:'user'},audio:false});
    videoEl.srcObject=stream;
    await videoEl.play();

    async function detect(){
      if(videoEl.readyState>=2){
        try{
          var preds=await model.estimateHands(videoEl,false);
          if(preds && preds.length>0){
            processHand(preds[0].landmarks);
          } else {
            gStatus.textContent='⏳ 检测中…';
            gCursor.style.display='none';
            cRing.classList.remove('active');
          }
        } catch(e){}
      }
      requestAnimationFrame(detect);
    }
    detect();
  } catch(e){
    gStatus.textContent='❌ 摄像头不可用';
    document.getElementById('loading').innerHTML='<div style="font-size:0.8rem;color:rgba(200,83,74,0.5);max-width:240px;text-align:center">摄像头权限被拒绝或不可用<br><br>请允许摄像头访问</div>';
    console.error(e);
  }
}

buildCards();
init();
</script>
</body>
</html>
